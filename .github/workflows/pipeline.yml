name: CI/CD - Build, Push, Deploy to EC2 Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t myapp:latest .

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Push Docker image to Docker Hub
        run: |
          docker tag myapp:latest ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      - name: Deploy to Kubernetes on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export KUBECONFIG=/home/ubuntu/.kube/config

            cd /home/ubuntu
            if [ ! -d "jenkins_pipeline_1" ]; then
              git clone https://github.com/SaiVarun107/jenkins_pipeline_1.git
            fi

            cd jenkins_pipeline_1
            git pull
            kubectl apply -f k8s
            kubectl rollout restart deployment myapp
            kubectl rollout status deployment myapp
